<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Dyslexic Prediction System </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
     body {
       background-image: url('Images/img1.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff7ed; /* soft orange/cream */
            color: #9a3412; /* deep orange-brown */
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #2d6a4f;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            background-color: #40916c;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #1b4332;
        }

        @media (min-width: 600px) {
            .btn-container {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1> Detect Dyslexic and Non -Dyslexic </h1>
        <p>Predict Detect Dyslexic and Non -Dyslexic </p>
        <div class="btn-container">
            <button onclick="redirectTo('admin_login.html')">Login</button>

        </div>
    </div>

    <script>
        function redirectTo(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
