<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/OcDZ-ekLh/";
    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // Load model and metadata
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Setup webcam
            const flip = true;
            webcam = new tmImage.Webcam(200, 200, flip);

            await webcam.setup({ facingMode: "environment" }); // Use back camera on phones
            await webcam.play();
            window.requestAnimationFrame(loop);

            // Display webcam
            document.getElementById("webcam-container").innerHTML = ""; // Clear previous if any
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Clear previous
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

        } catch (err) {
            alert("Error accessing webcam: " + err.message);
            console.error(err);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        // Show highest prediction only
        let bestPrediction = prediction[0];
        for (let i = 1; i < prediction.length; i++) {
            if (prediction[i].probability > bestPrediction.probability) {
                bestPrediction = prediction[i];
            }
        }

        labelContainer.innerHTML = `<h3>Prediction: ${bestPrediction.className}</h3>`;
    }


</script>
