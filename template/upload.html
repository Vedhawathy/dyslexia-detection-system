<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyslexic and   non-Dyslexic Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">

    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Images/logo.png">
    <style>
        body {
            font-family: 'Titillium Web', sans-serif;
            background-color: #f8f9fa;
        }

        .title {
            font-family: 'Rubik', sans-serif;
            font-weight: bold;
        }

        #imagePreview {
            height: 300px;
            display: none;
            margin-top: 20px;
            border: 2px solid #ddd;
            padding: 5px;
            border-radius: 8px;
        }

        #label-container {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark" style="background-color: #000980;">
        <a class="navbar-brand title px-3" href="#">
            <img src="Images/logo.png" width="30" height="30" class="d-inline-block align-top" alt="logo">
            Dyslexic and   non-Dyslexic Prediction
        </a>
    </nav>

    <div class="container py-5" id="main">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-md-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title py-3 title text-center">Detect if Dyslexic and   non-Dyslexic </h3>
                        <p class="px-3 text-center">Upload a Dyslexic and   non-Dyslexic image to check if it’s <strong>Dyslexic </strong> or shows signs of <strong> non-Dyslexic </strong>.</p>

                        <center>
                            <input id="imageUpload" type="file" class="form-control w-50 mb-3" />
                            <img id="imagePreview" />
                        </center>

                        <div id="label-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center p-2">
        © 2025 Dyslexic and   non-Dyslexic Prediction
    </footer>

    <!-- TensorFlow and Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/OcDZ-ekLh/";

        let model, labelContainer, maxPredictions;

        // Load the model
        async function init() {
            const modelURL = URL + 'model.json';
            const metadataURL = URL + 'metadata.json';

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                labelContainer = document.getElementById('label-container');
            } catch (error) {
                alert("Model failed to load. Check your model URL or internet connection.");
            }
        }

        async function predict() {
            const image = document.getElementById('imagePreview');
            const prediction = await model.predict(image, false);

            // Find highest probability class
            let bestPrediction = prediction[0];
            for (let i = 1; i < prediction.length; i++) {
                if (prediction[i].probability > bestPrediction.probability) {
                    bestPrediction = prediction[i];
                }
            }

            const resultText = `${bestPrediction.className.toUpperCase()} : ${(bestPrediction.probability * 100).toFixed(2)}%`;

            labelContainer.innerHTML = `<h4 class="${bestPrediction.className.toLowerCase().includes('healthy') ? 'text-success' : 'text-danger'}">${resultText}</h4>`;
        }

        // Handle file upload
        function readURL(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    $('#imagePreview').attr('src', e.target.result).show();
                };
                reader.readAsDataURL(input.files[0]);

                // Load model and predict
                init().then(() => {
                    predict();
                });
            }
        }

        $('#imageUpload').change(function () {
            readURL(this);
        });
    </script>
</body>
